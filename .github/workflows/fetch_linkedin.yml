name: Fetch LinkedIn Posts

on:
  schedule:
    - cron: '0 6 * * *' # Runs every day at 06:00 UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Fetch Script
        env:
          LINKEDIN_FEED_URL: ${{ secrets.LINKEDIN_FEED_URL }}
        run: python fetch_linkedin_posts.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          if git diff --staged --quiet; then
            echo "articles.json dosyasında değişiklik yok, commit atlanıyor."
          else
            git commit -m "chore(data): auto-update LinkedIn articles via GitHub Action"
            git push
          fi
